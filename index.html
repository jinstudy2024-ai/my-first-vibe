<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>오영진 · AI 컨설턴트</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    height: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Malgun Gothic", "맑은 고딕", Roboto, sans-serif;
    background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #334155 100%);
    color: #f1f5f9;
    line-height: 1.6;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .container {
    width: 100%;
    max-width: 880px;
  }

  .hero {
    text-align: center;
    margin-bottom: 64px;
  }

  .badge {
    display: inline-block;
    padding: 6px 14px;
    background: rgba(99, 102, 241, 0.15);
    color: #a5b4fc;
    border: 1px solid rgba(99, 102, 241, 0.35);
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.5px;
    margin-bottom: 24px;
  }

  .name {
    font-size: clamp(36px, 6vw, 56px);
    font-weight: 700;
    letter-spacing: -1px;
    margin-bottom: 12px;
    background: linear-gradient(135deg, #ffffff 0%, #cbd5e1 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .title {
    font-size: clamp(16px, 2.4vw, 20px);
    color: #94a3b8;
    margin-bottom: 28px;
    font-weight: 500;
  }

  .intro {
    font-size: clamp(15px, 2vw, 18px);
    color: #cbd5e1;
    max-width: 620px;
    margin: 0 auto;
    line-height: 1.7;
  }

  .skills {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 56px;
  }

  .skill-card {
    background: rgba(30, 41, 59, 0.6);
    border: 1px solid rgba(148, 163, 184, 0.15);
    border-radius: 16px;
    padding: 28px 20px;
    text-align: center;
    transition: transform 0.25s ease, border-color 0.25s ease, background 0.25s ease;
    backdrop-filter: blur(10px);
  }

  .skill-card:hover {
    transform: translateY(-4px);
    border-color: rgba(99, 102, 241, 0.5);
    background: rgba(30, 41, 59, 0.85);
  }

  .skill-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(99, 102, 241, 0.15);
    border-radius: 12px;
    font-size: 24px;
    font-weight: 700;
    color: #a5b4fc;
  }

  .skill-name {
    font-size: 17px;
    font-weight: 600;
    color: #f1f5f9;
    margin-bottom: 6px;
  }

  .skill-desc {
    font-size: 13px;
    color: #94a3b8;
  }

  .cta {
    text-align: center;
  }

  .cta-label {
    color: #94a3b8;
    font-size: 14px;
    margin-bottom: 16px;
  }

  .email-button {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 16px 32px;
    background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
    color: white;
    text-decoration: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
    box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
  }

  .email-button:hover {
    transform: translateY(-2px);
    box-shadow: 0 15px 40px rgba(99, 102, 241, 0.45);
  }

  .email-button:active {
    transform: translateY(0);
  }

  .footer {
    margin-top: 48px;
    text-align: center;
    color: #64748b;
    font-size: 13px;
  }

  @media (max-width: 640px) {
    body {
      padding: 32px 16px;
    }
    .hero {
      margin-bottom: 40px;
    }
    .skills {
      grid-template-columns: 1fr;
      gap: 14px;
      margin-bottom: 40px;
    }
    .skill-card {
      padding: 22px 18px;
    }
    .email-button {
      width: 100%;
      justify-content: center;
    }
  }
</style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="badge">AI CONSULTANT</div>
      <h1 class="name">오영진</h1>
      <p class="title">AI 컨설턴트</p>
      <p class="intro">소상공인과 중소기업의 AX 전환, 제조 및 업무 자동화를 돕습니다.</p>
    </section>

    <section class="skills">
      <div class="skill-card">
        <div class="skill-icon">XL</div>
        <div class="skill-name">엑셀</div>
        <div class="skill-desc">데이터 가공 · 자동화 함수</div>
      </div>
      <div class="skill-card">
        <div class="skill-icon">PT</div>
        <div class="skill-name">파워포인트</div>
        <div class="skill-desc">전략 보고서 · 시각화 자료</div>
      </div>
      <div class="skill-card">
        <div class="skill-icon">DA</div>
        <div class="skill-name">데이터 분석</div>
        <div class="skill-desc">인사이트 도출 · 의사결정 지원</div>
      </div>
    </section>

    <section class="cta">
      <p class="cta-label">프로젝트 문의 및 상담</p>
      <a class="email-button" href="mailto:jinstudy@daum.net">
        <span>✉</span>
        <span>jinstudy@daum.net</span>
      </a>
    </section>

    <div class="footer">© 2026 오영진 · AI Consultant</div>
  </div>
</body>
</html>
